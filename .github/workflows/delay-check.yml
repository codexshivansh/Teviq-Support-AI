name: Delay Check

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC). GitHub's scheduler runs
    # on a best-effort basis and can lag a few minutes behind the exact time
    # during high load — acceptable for this use case.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  run-delay-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /internal/run-delay-check
        run: |
          # --max-time gives Render's free-tier cold start (if the service
          # was asleep) room to wake up and respond, rather than curl timing
          # out early. This request itself is also what wakes the service.
          http_status=$(curl -s -o response.json -w "%{http_code}" --max-time 120 -X POST \
            "https://teviq-support-ai-backend.onrender.com/internal/run-delay-check" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_CRON_SECRET }}")

          echo "HTTP status: $http_status"
          echo "Response body:"
          cat response.json
          echo

          if [ "$http_status" -ne 200 ]; then
            echo "::error::Delay check request failed with HTTP $http_status"
            exit 1
          fi
