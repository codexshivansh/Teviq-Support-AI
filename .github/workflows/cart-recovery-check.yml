name: Cart Recovery Check

on:
  schedule:
    # Every hour. The abandonment threshold is only 2 hours (vs. the delay
    # check's multi-day order-delivery windows), so an hourly cadence keeps
    # the alert reasonably close to the 2-hour mark instead of drifting by
    # up to 6 hours the way delay-check.yml's cadence would.
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  run-cart-recovery-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /internal/run-cart-recovery-check
        run: |
          # --max-time gives Render's free-tier cold start (if the service
          # was asleep) room to wake up and respond, rather than curl timing
          # out early. This request itself is also what wakes the service.
          http_status=$(curl -s -o response.json -w "%{http_code}" --max-time 120 -X POST \
            "https://teviq-support-ai-backend.onrender.com/internal/run-cart-recovery-check" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_CRON_SECRET }}")

          echo "HTTP status: $http_status"
          echo "Response body:"
          cat response.json
          echo

          if [ "$http_status" -ne 200 ]; then
            echo "::error::Cart recovery check request failed with HTTP $http_status"
            exit 1
          fi
